{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <!-- Yahan niche dekho, humne classes add ki hain -->
        <div class="col-md-4 card p-4 shadow animate__animated animate__fadeInUp">
            <h2 class="text-center">Login</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn w-100" style="background-color: #2c3e50; color: white; transition: 0.3s;">
    Login
</button>
            </form>
            <p class="mt-3 text-center">Don't have an account? <a href="#">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
<style>
    body {
        /* Ek professional sa light-grey/blue gradient background */
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    .card {
        background: rgba(255, 255, 255, 0.95); /* Thoda transparent look */
        backdrop-filter: blur(10px); /* Glassmorphism effect */
        border: 1px solid rgba(255, 255, 255, 0.3);
    }
</style>
