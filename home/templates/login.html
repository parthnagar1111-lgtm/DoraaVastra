{% extends 'base.html' %}

{% block content %}
<style>
    /* 1. Page Wrapper: Full Screen Background */
    .login-page-wrapper {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        overflow: hidden;
    }

    /* 2. Watermark Circle: Rotating Logo/Brand Name */
    .watermark-circle {
        position: absolute;
        width: 400px;
        height: 400px;
        border: 2px solid rgba(44, 62, 80, 0.1);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5rem;
        font-weight: 800;
        color: rgba(44, 62, 80, 0.08);
        text-transform: uppercase;
        animation: rotateCircle 25s linear infinite;
        z-index: 1;
    }

    @keyframes rotateCircle {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* 3. Login Card: Glassmorphism Style */
    .login-card {
        z-index: 2;
        background: rgba(255, 255, 255, 0.85) !important;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 20px !important;
        padding: 40px !important;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1) !important;
        width: 100%;
        max-width: 400px;
    }

    /* 4. Button Styling */
    .btn-login {
        background-color: #2c3e50 !important;
        color: white !important;
        padding: 10px;
        border-radius: 8px;
        transition: 0.3s;
    }

    .btn-login:hover {
        background-color: #34495e !important;
        transform: scale(1.02);
    }
</style>

<div class="login-page-wrapper">
    <!-- Watermark -->
    <div class="watermark-circle">doraaVastra</div>

    <!-- Login Card -->
    <div class="login-card animate__animated animate__fadeInUp">
        <h2 class="text-center mb-4">Login</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-login w-100">Login</button>
        </form>
        <p class="mt-3 text-center">Don't have an account? <a href="#">Register here</a></p>
    </div>
</div>
{% endblock %}
